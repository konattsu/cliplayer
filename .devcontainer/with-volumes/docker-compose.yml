services:
  cliplayer-dev:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: cliplayer-dev
    working_dir: /workspaces

    # ports:

    volumes:
      - ~/cliplayer:/workspaces:cached
      - ${SSH_AUTH_SOCK}:/ssh-agent

    environment:
      SSH_AUTH_SOCK: /ssh-agent
      # NODE_ENV: development
      # CHOKIDAR_USEPOLLING: true

    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined

    command: sleep infinity
