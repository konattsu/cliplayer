name: musictl build

# Build musictl when music files are changed, and upload the binary to S3.

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "music/**"
      - "!music/data/"
      - "!**/*.md"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    permissions:
      id-token: write # required for requesting the JWT
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build musictl
        run: cargo build --release --bin musictl

      - name: Run tests
        run: cargo test --all --release

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload musictl binary to S3
        run: |
          chmod +x target/release/musictl
          aws s3 cp target/release/musictl s3://${{ secrets.S3_BUCKET }}/cliplayer/musictl

      - name: Upload musictl artifact
        uses: actions/upload-artifact@v7
        with:
          name: musictl-binary
          path: target/release/musictl
