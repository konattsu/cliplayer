name: Validate music data

on:
  pull_request:
    branches:
      - main
    paths:
      - "music/data/music/**"
      - "music/data/input/**"
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  check_s3:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    permissions:
      id-token: write # required for requesting the JWT
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Look for musictl in S3
        id: check
        run: |
          if aws s3 ls s3://${{ secrets.S3_BUCKET }}/cliplayer/musictl > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  build_if_needed:
    needs: check_s3
    if: needs.check_s3.outputs.exists == 'false'
    uses: ./.github/workflows/musictl.yml
    secrets: inherit

  validate:
    needs: [check_s3, build_if_needed]
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 50

      # Determine operation type from PR labels (music-add / music-update).
      # Both labels present: BOTH, neither: NONE (skip).
      - name: Detect operation type from PR labels
        id: op_type
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels) }}'
          HAS_ADD=$(echo "$LABELS"   | jq '[.[].name] | contains(["music-add"])')
          HAS_UPDATE=$(echo "$LABELS" | jq '[.[].name] | contains(["music-update"])')

          if [ "$HAS_ADD" = "true" ] && [ "$HAS_UPDATE" = "true" ]; then
            echo "op=BOTH" >> $GITHUB_OUTPUT
          elif [ "$HAS_ADD" = "true" ]; then
            echo "op=ADD" >> $GITHUB_OUTPUT
          elif [ "$HAS_UPDATE" = "true" ]; then
            echo "op=UPDATE" >> $GITHUB_OUTPUT
          else
            echo "op=NONE" >> $GITHUB_OUTPUT
          fi
          echo "Detected operation: $(cat $GITHUB_OUTPUT | grep '^op=' | cut -d= -f2)"

      # Only needed for ADD / BOTH — collects input files added in this PR.
      - name: Get input files
        id: input_files
        if: steps.op_type.outputs.op == 'ADD' || steps.op_type.outputs.op == 'BOTH'
        run: |
          FILES=$(git diff --name-only \
            ${{ github.event.pull_request.base.sha }} ${{ github.sha }} \
            | grep '^music/data/input' | xargs)
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Prepare bin directory
        run: mkdir -p ./bin

      - name: Configure AWS credentials (OIDC)
        if: needs.check_s3.outputs.exists == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Obtain musictl binary from S3
        if: needs.check_s3.outputs.exists == 'true'
        run: aws s3 cp s3://${{ secrets.S3_BUCKET }}/cliplayer/musictl ./bin/musictl

      - name: Download musictl artifact
        if: needs.build_if_needed.result == 'success'
        uses: actions/download-artifact@v7
        with:
          name: musictl-binary
          path: ./bin

      - name: Make musictl executable
        run: chmod +x ./bin/musictl

      - name: Validate (add)
        if: steps.op_type.outputs.op == 'ADD'
        run: |
          ./bin/musictl validate add    -i "${{ steps.input_files.outputs.files }}" --file-tracing-level debug
          ./bin/musictl validate add-md -i "${{ steps.input_files.outputs.files }}" --file-tracing-level debug > ./validate_output.md

      - name: Validate (update)
        if: steps.op_type.outputs.op == 'UPDATE'
        run: ./bin/musictl validate update --file-tracing-level debug

      - name: Validate (add & update)
        if: steps.op_type.outputs.op == 'BOTH'
        run: |
          ./bin/musictl validate add    -i "${{ steps.input_files.outputs.files }}" --file-tracing-level debug
          ./bin/musictl validate update --file-tracing-level debug
          ./bin/musictl validate add-md -i "${{ steps.input_files.outputs.files }}" --file-tracing-level debug > ./validate_output.md

      - name: Post validation result as PR comment
        if: steps.op_type.outputs.op == 'ADD' || steps.op_type.outputs.op == 'BOTH'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr comment "$PR_URL" --body-file ./validate_output.md

      - name: Post logs
        if: always()
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: ./tools/musictl_logs_to_stdout.sh
