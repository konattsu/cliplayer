name: Synchronize music data

on:
  schedule:
    - cron: "0 0 */21 * *"
  workflow_dispatch:

jobs:
  check_s3:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    permissions:
      id-token: write # required for requesting the JWT
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Look for musictl in S3
        id: check
        run: |
          if aws s3 ls s3://${{ secrets.S3_BUCKET }}/cliplayer/musictl > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  build_if_needed:
    needs: check_s3
    if: needs.check_s3.outputs.exists == 'false'
    uses: ./.github/workflows/musictl.yml
    secrets: inherit

  sync:
    needs: [check_s3, build_if_needed]
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
      CARGO_TERM_COLOR: always
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Git setup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="auto/music-sync-$(date +'%Y%m%d-%H%M%S')"
          git switch -c "$BRANCH" origin/main

      - name: Configure AWS credentials (OIDC)
        if: needs.check_s3.outputs.exists == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Prepare bin directory
        run: mkdir -p ./bin

      - name: Obtain musictl binary from S3
        if: needs.check_s3.outputs.exists == 'true'
        run: aws s3 cp s3://${{ secrets.S3_BUCKET }}/cliplayer/musictl ./bin/musictl

      - name: Download musictl artifact
        if: needs.build_if_needed.result == 'success'
        uses: actions/download-artifact@v7
        with:
          name: musictl-binary
          path: ./bin

      - name: Make musictl executable
        run: chmod +x ./bin/musictl

      - name: Apply sync to music data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: ./bin/musictl apply sync --file-tracing-level debug

      - name: Post musictl logs
        if: always()
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: ./tools/musictl_logs_to_stdout.sh

      - name: Commit and push changes
        run: |
          COMMIT_MSG="[music-sync] $(date +'%Y-%m-%d')"
          git add music/data/music/ public/music/ || true
          git commit -m "$COMMIT_MSG" || echo "no changes to commit"
          git push origin HEAD

      - name: Create PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TITLE="[music-sync] manual by ${{ github.actor }}"
            BODY="Manual sync requested by ${{ github.actor }}"
          else
            TITLE="[music-sync] scheduled ($(date +'%Y-%m-%d'))"
            BODY="Scheduled sync on $(date +'%Y-%m-%d')"
          fi
          gh pr create --base main --head "$(git rev-parse --abbrev-ref HEAD)" \
            --title "$TITLE" \
            --body "$BODY" \
            --label music-sync
