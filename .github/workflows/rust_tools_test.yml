name: rust tools test

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "music/**"
      - "!music/data/**"
      - "metadata/**"
      - "!metadata/artist/**"
      - "!metadata/tag/**"
      - "search/**"
      - "cmn_rs/**"
      - "**/Cargo.toml"
      - "!**/*.md"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up mold
        uses: rui314/setup-mold@v1
        with:
          mold-version: 2.41.0

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Run fmt check
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --tests --examples -- -D clippy::all

      - name: Run tests
        run: cargo test --all --release
