name: Lint, Format, and Test for Frontend

on:
  push:
    branches: [main]
    paths:
      - "**"
      - "!music/**"
      - "!cmn_rs/**"
      - "!artist/**"
      - "music/**/*.md"
      - "cmn_rs/**/*.md"
      - "artist/**/*.md"
  pull_request:
    branches: [main]
    paths:
      - "**"
      - "!music/**"
      - "!cmn_rs/**"
      - "!artist/**"
      - "music/**/*.md"
      - "cmn_rs/**/*.md"
      - "artist/**/*.md"

jobs:
  lint-format-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm ci

      - name: Run ESLint
        run: pnpm run lint:test

      - name: Run Prettier
        run: pnpm run format:test

      - name: Run tests
        run: pnpm run test
