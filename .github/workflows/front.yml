name: Lint, Format, and Test for Frontend

on:
  push:
    branches: [mainnnnnnnnnnnnnnnnnnnnnnnnnnnnnnnnnnnnnnnn]
    paths:
      - "**"
      - "!music/**"
      - "music/**/*.md"
  pull_request:
    branches: [mainnnnnnnnnnnnnnnnnnnnnnnnnnnnnnnnnnnnnnnn]
    paths:
      - "**"
      - "!music/**"
      - "music/**/*.md"

jobs:
  lint-format-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: pnpm ci

      - name: Run ESLint
        run: pnpm run lint:test

      - name: Run Prettier
        run: pnpm run format:test

      - name: Run tests
        run: pnpm run test
