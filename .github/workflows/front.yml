name: Lint, Format, and Test for Frontend

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - ".prettier*"
      - ".angular.json"
      - "tsconfig.json"
      - "eslint.config.ts"
      - "index.html"
      - "package.json"
      - "pnpm-lock.yaml"
      - "README.md"
      - "tsconfig.*.json"
      - "tsconfig.json"

jobs:
  lint-format-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint:test

      - name: Run Prettier
        run: pnpm run format:test

      - name: Run tests
        run: pnpm run test
