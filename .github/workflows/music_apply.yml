name: Apply music data

on:
  push:
    branches:
      - main
    paths:
      - "music/data/music/**"
      - "music/data/input/**"

jobs:
  check_s3:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    permissions:
      id-token: write # required for requesting the JWT
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Look for musictl in S3
        id: check
        run: |
          if aws s3 ls s3://${{ secrets.S3_BUCKET }}/cliplayer/musictl > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  build_if_needed:
    needs: check_s3
    if: needs.check_s3.outputs.exists == 'false'
    uses: ./.github/workflows/musictl.yml
    secrets: inherit

  apply:
    needs: [check_s3, build_if_needed]
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
      CARGO_TERM_COLOR: always
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 50

      - name: Git setup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main

      # Determine operation type from labels on the last merged PR
      # (music-add / music-update). Both labels present → BOTH, neither → NONE (skip).
      - name: Detect operation type from merged PR labels
        id: op_type
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=$(gh pr list --state merged --base main --limit 1 --json number --jq '.[0].number')
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

          LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name]')
          HAS_ADD=$(echo "$LABELS"    | jq 'contains(["music-add"])')
          HAS_UPDATE=$(echo "$LABELS" | jq 'contains(["music-update"])')

          PR_TITLE=$(gh pr view "$PR_NUMBER" --json title --jq '.title')
          echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT

          if [ "$HAS_ADD" = "true" ] && [ "$HAS_UPDATE" = "true" ]; then
            echo "op=BOTH" >> $GITHUB_OUTPUT
          elif [ "$HAS_ADD" = "true" ]; then
            echo "op=ADD" >> $GITHUB_OUTPUT
          elif [ "$HAS_UPDATE" = "true" ]; then
            echo "op=UPDATE" >> $GITHUB_OUTPUT
          else
            echo "op=NONE" >> $GITHUB_OUTPUT
          fi
          echo "Detected operation: $(cat $GITHUB_OUTPUT | grep '^op=' | cut -d= -f2)"

      # Only needed for ADD / BOTH — collects input files added in this push.
      - name: Get input files
        id: input_files
        if: steps.op_type.outputs.op == 'ADD' || steps.op_type.outputs.op == 'BOTH'
        run: |
          FILES=$(git diff --name-only \
            ${{ github.event.before }} ${{ github.event.after }} \
            | grep '^music/data/input' | xargs)
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Prepare bin directory
        run: mkdir -p ./bin

      - name: Configure AWS credentials (OIDC)
        if: needs.check_s3.outputs.exists == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Obtain musictl binary from S3
        if: needs.check_s3.outputs.exists == 'true'
        run: aws s3 cp s3://${{ secrets.S3_BUCKET }}/cliplayer/musictl ./bin/musictl

      - name: Download musictl artifact
        if: needs.build_if_needed.result == 'success'
        uses: actions/download-artifact@v7
        with:
          name: musictl-binary
          path: ./bin

      - name: Make musictl executable
        run: chmod +x ./bin/musictl

      - name: Apply (add)
        if: steps.op_type.outputs.op == 'ADD'
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          ./bin/musictl apply add -i "${{ steps.input_files.outputs.files }}" --file-tracing-level debug
          rm ${{ steps.input_files.outputs.files }}

      - name: Apply (update)
        if: steps.op_type.outputs.op == 'UPDATE'
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: ./bin/musictl apply update --file-tracing-level debug

      # updateを先に実行することでどこで落ちたか分かり易くする
      - name: Apply (add & update)
        if: steps.op_type.outputs.op == 'BOTH'
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          ./bin/musictl apply update --file-tracing-level debug
          ./bin/musictl apply add -i "${{ steps.input_files.outputs.files }}" --file-tracing-level debug
          rm ${{ steps.input_files.outputs.files }}

      - name: Post musictl logs
        if: always() && steps.op_type.outputs.op != 'NONE'
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: ./tools/musictl_logs_to_stdout.sh

      - name: Commit and push changes
        if: steps.op_type.outputs.op != 'NONE'
        run: |
          PR_NUMBER="${{ steps.op_type.outputs.pr_number }}"
          PR_TITLE="${{ steps.op_type.outputs.pr_title }}"
          BRANCH="auto/music-apply-pr-${PR_NUMBER}-$(date +'%Y%m%d-%H%M%S')"
          git switch -c "$BRANCH" origin/main
          git add music/data/input/
          git add music/data/music/
          git add public/music/
          git commit -m "[music-apply] Apply from PR #${PR_NUMBER}: ${PR_TITLE}" || echo "no changes to commit"
          git push origin HEAD

      - name: Create PR
        if: steps.op_type.outputs.op != 'NONE'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ steps.op_type.outputs.pr_number }}"
          PR_TITLE="${{ steps.op_type.outputs.pr_title }}"
          gh pr create --base main --head "$(git rev-parse --abbrev-ref HEAD)" \
            --title "[music-apply] From PR #${PR_NUMBER}: ${PR_TITLE}" \
            --body "Auto-applied changes from PR #${PR_NUMBER}: ${PR_TITLE}"
